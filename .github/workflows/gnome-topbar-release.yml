name: gnome-topbar release

# Independent of the anti-tangent binary's release flow. Triggered by a
# gnome-topbar-vX.Y.Z tag (or manually), it builds the daemon as static Linux
# binaries and publishes a GitHub Release whose assets a consumer (e.g. the
# sandbox image) can fetch by URL.
on:
  push:
    tags: ['gnome-topbar-v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag, e.g. gnome-topbar-v0.1.0'
        required: true

permissions:
  contents: write # create the release + upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = workflow_dispatch ]; then
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
          fi

      - name: Build static binaries (linux amd64 + arm64)
        working-directory: gnome-topbar/daemon
        run: |
          ver='${{ steps.ver.outputs.tag }}'
          for arch in amd64 arm64; do
            CGO_ENABLED=0 GOOS=linux GOARCH="$arch" \
              go build -trimpath -ldflags="-s -w -X main.version=$ver" \
              -o "$GITHUB_WORKSPACE/gnome-topbar-daemon-linux-$arch" \
              ./cmd/gnome-topbar-daemon
          done

      - name: Checksums + publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sha256sum gnome-topbar-daemon-linux-* > gnome-topbar-checksums.txt
          gh release create '${{ steps.ver.outputs.tag }}' \
            --title '${{ steps.ver.outputs.tag }}' \
            --notes 'gnome-topbar tray daemon — static Linux binaries (amd64, arm64). Pure-Go (no GTK/cgo); registers a StatusNotifierItem on the session bus.' \
            gnome-topbar-daemon-linux-amd64 \
            gnome-topbar-daemon-linux-arm64 \
            gnome-topbar-checksums.txt
