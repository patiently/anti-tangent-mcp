# Copy to ~/.config/gnome-topbar/config.toml and fill in.
# BM_URL and BM_BEARER_TOKEN are read from the environment (e.g. exported in your
# shell or in ~/.config/gnome-topbar/env when run as a systemd --user service);
# you usually only need to set bm_username here.

bm_username = "<your-basic-memory-username>"
bm_project  = "main"

# Optional overrides (defaults shown):
# listen_port        = 47615
# github_interval_sec = 120
# bm_interval_sec     = 300
# morning_sweep_hour  = 8
